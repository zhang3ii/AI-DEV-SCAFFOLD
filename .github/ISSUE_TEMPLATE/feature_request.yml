name: "\U0001f4a1 Feature Request"
description: 建议新功能或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: 感谢你的建议！

  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题
      placeholder: 你目前遇到什么痛点？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      placeholder: 你希望怎么实现？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      placeholder: 你是否考虑过其他方案？

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 主脚本 (init.sh)
        - 生成的模板文件
        - GitHub Actions
        - 文档
        - 其他
